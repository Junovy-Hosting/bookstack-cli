# Serena project configuration for bookstack-cli
# CLI tool for importing content into BookStack

project_name: bookstack-cli

languages:
  - typescript

encoding: utf-8
ignore_all_files_in_gitignore: true

ignored_paths:
  - "node_modules/"
  - "*.lock"

default_modes:
  - interactive
  - editing

initial_prompt: |
  BookStack CLI: a command-line tool for importing content into BookStack
  (the documentation platform at support.junovy.com).
  Built with JavaScript/TypeScript.

read_only: false
excluded_tools: []
included_optional_tools: []
fixed_tools: []
